<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="description" content="Snake game" />
	<meta name="author" content="Yogesh Agarwala" />
	<meta name="keywords" content="yogesh, agarwal, yogesh agarwala, Snake game, iit madras" />

	<meta property="og:title" content="Yogesh Agarwala | Snake Game" />
	<meta property="og:image" content="/snake-game/images/whatsapp.png" />
	<meta property="og:description" content="Snake game" />
	<meta property="og:url" content="https://yogeshiitm.github.io/snake-game/" />
	<meta property="og:type" content="Snake Game">

	<title> Play Snake Game </title>
	<!-- Favicon-->
	<link rel="icon" type="image/png" href="images/favicon.ico" />
	<link rel="stylesheet" href="css/styles.css?version=6">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background-color: #1a252f;
			color: white;
			font-family: 'Arial', sans-serif;
			overflow: hidden;
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.back-btn {
			position: fixed;
			top: 15px;
			left: 15px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 25px;
			font-size: 14px;
			cursor: pointer;
			z-index: 1001;
			transition: all 0.3s ease;
			box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
			display: flex;
			align-items: center;
			gap: 8px;
			font-family: Arial, sans-serif;
		}
		.back-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
		}

		/* Navigation Bar */
		.nav-bar {
			background: linear-gradient(135deg, rgba(26, 37, 47, 0.95), rgba(44, 62, 80, 0.95));
			padding: 15px 30px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			border-bottom: 2px solid #667eea;
			z-index: 100;
		}

		.nav-title {
			font-size: 24px;
			font-weight: bold;
			color: #667eea;
			letter-spacing: 2px;
		}

		.scores-container {
			display: flex;
			gap: 30px;
			align-items: center;
		}

		.score-item {
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.score-label {
			font-size: 12px;
			color: #aaa;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-bottom: 5px;
		}

		.score-value {
			font-size: 28px;
			font-weight: bold;
			color: #00ff7f;
			min-width: 80px;
			text-align: center;
		}

		/* Game Container */
		.game-container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		#boardid {
			border: 3px solid #667eea;
			box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
			background-image: url("../images/board.jpg");
			max-width: 95vw;
			max-height: calc(95vh - 100px);
		}

		/* Controls Container */
		.controls-container {
			display: none;
			flex-direction: column;
			align-items: center;
			gap: 10px;
			padding: 20px;
			background: linear-gradient(135deg, rgba(44, 62, 80, 0.8), rgba(26, 37, 47, 0.8));
			border-top: 2px solid #667eea;
		}

		.controls-container.show {
			display: flex;
		}

		.button-group {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
		}

		.d-pad {
			display: grid;
			grid-template-columns: 60px 60px 60px;
			grid-template-rows: 60px 60px 60px;
			gap: 8px;
			margin-bottom: 15px;
		}

		.direction-btn {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			border: none;
			border-radius: 10px;
			font-size: 20px;
			cursor: pointer;
			transition: all 0.2s ease;
			box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
			font-weight: bold;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.direction-btn:hover {
			transform: scale(1.1);
			box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
		}

		.direction-btn:active {
			transform: scale(0.95);
		}

		.btn-up { grid-column: 2; grid-row: 1; }
		.btn-left { grid-column: 1; grid-row: 2; }
		.btn-down { grid-column: 2; grid-row: 3; }
		.btn-right { grid-column: 3; grid-row: 2; }

		.start-btn {
			background: linear-gradient(135deg, #00ff7f 0%, #00cc66 100%);
			color: #1a252f;
			border: none;
			padding: 12px 30px;
			border-radius: 25px;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.3s ease;
			box-shadow: 0 4px 15px rgba(0, 255, 127, 0.4);
		}

		.start-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(0, 255, 127, 0.6);
		}

		.start-btn:active {
			transform: translateY(0);
		}

		.status-message {
			color: #ff6b6b;
			font-size: 16px;
			font-weight: bold;
			text-align: center;
			margin-top: 10px;
		}

		/* Responsive */
		@media (max-width: 768px) {
			.nav-bar {
				flex-direction: column;
				gap: 10px;
			}

			.scores-container {
				gap: 20px;
				width: 100%;
				justify-content: center;
			}

			.d-pad {
				grid-template-columns: 50px 50px 50px;
				grid-template-rows: 50px 50px 50px;
			}

			.direction-btn {
				font-size: 18px;
			}

			#boardid {
				max-width: 100vw;
				max-height: auto;
			}
		}
	</style>
</head>

<body id="body">
	<button class="back-btn" onclick="window.history.back()">← Back</button>

	<!-- Navigation Bar -->
	<div class="nav-bar">
		<div class="nav-title">🐍 SNAKE GAME</div>
		<div class="scores-container">
			<div class="score-item">
				<div class="score-label">Highest Score</div>
				<div class="score-value" id="message1">0</div>
			</div>
			<div class="score-item">
				<div class="score-label">Current Score</div>
				<div class="score-value" id="message2">0</div>
			</div>
		</div>
	</div>

	<!-- Game Container -->
	<div class="game-container">
		<canvas id="boardid"></canvas>
	</div>

	<!-- Controls Container -->
	<div class="controls-container show">
		<div class="button-group">
			<div class="d-pad">
				<button class="direction-btn btn-up" onclick="setDirection('up')">▲</button>
				<button class="direction-btn btn-left" onclick="setDirection('left')">◄</button>
				<button class="direction-btn btn-down" onclick="setDirection('down')">▼</button>
				<button class="direction-btn btn-right" onclick="setDirection('right')">►</button>
			</div>
			<button class="start-btn" onclick="start()">START GAME</button>
		</div>
		<div class="status-message" id="message3">Press Start or Enter to begin!</div>
	</div>

	<script src="js/scripts.js?version=14"></script>
</body>
</html>
